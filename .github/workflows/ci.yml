name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ 后端测试 ============
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backed
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: |
          python -m py_compile main.py database.py home_device.py
          python -m py_compile app/crud.py app/schemas.py app/sse.py
          python -m py_compile app/routers/devices.py app/routers/chat.py app/routers/scenes.py

      - name: Run pytest
        run: pytest test_home_devices.py -v

  # ============ 前端测试 + 构建 ============
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true  # lint 不阻断构建

      - name: Run tests
        run: npm run test
        continue-on-error: true  # 测试基础设施首次跑通，暂不阻断

      - name: Build
        run: npm run build

  # ============ Docker 镜像构建验证 ============
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend.Dockerfile
          push: false
          tags: ai-smart-home-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend.Dockerfile
          push: false
          tags: ai-smart-home-frontend:ci
